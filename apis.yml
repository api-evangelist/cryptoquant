created: '2025-02-12'
modified: '2026-04-28'
apis:
  - aid: cryptoquant:cryptoquant-api
    name: CryptoQuant API
    description: >-
      The CryptoQuant API exposes on-chain, exchange flow, market, miner, and
      stablecoin metrics for major cryptocurrencies via a versioned REST
      interface. Authentication uses an API key passed as a bearer token.
    humanURL: https://cryptoquant.com/docs
    baseURL: https://api.cryptoquant.com/v1
    tags:
      - On-Chain Analytics
      - Exchange Flows
      - Miner Flows
      - Market Data
      - Stablecoins
    properties:
