x-type: company
name: CryptoQuant
description: >-
  CryptoQuant is a blockchain data analytics platform providing real-time and
  historical on-chain, exchange flow, miner, derivatives, and stablecoin
  metrics for Bitcoin, Ethereum, and other major cryptocurrencies. The API
  delivers time-series data used by traders, funds, and researchers to gauge
  market sentiment and capital flows.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
